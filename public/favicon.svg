<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Nexum Analytics">
  <!-- Fondo badge -->
  <rect width="100" height="100" rx="20" fill="#0D1F3C"/>
  <radialGradient id="g" cx="30%" cy="20%" r="60%">
    <stop offset="0%" stop-color="#2563EB" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#0D1F3C" stop-opacity="0"/>
  </radialGradient>
  <rect width="100" height="100" rx="20" fill="url(#g)"/>
  <!-- N shape -->
  <line x1="22" y1="15" x2="22" y2="85" stroke="#2563EB" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="22" y1="15" x2="78" y2="85" stroke="#2563EB" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="78" y1="15" x2="78" y2="85" stroke="#2563EB" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Nodos -->
  <circle cx="22" cy="15" r="7.5" fill="#0D1F3C" stroke="#2563EB" stroke-width="3"/>
  <circle cx="22" cy="85" r="7.5" fill="#0D1F3C" stroke="#2563EB" stroke-width="3"/>
  <circle cx="78" cy="15" r="7.5" fill="#0D1F3C" stroke="#2563EB" stroke-width="3"/>
  <circle cx="78" cy="85" r="7.5" fill="#0D1F3C" stroke="#2563EB" stroke-width="3"/>
  <!-- Nodo central con halo -->
  <circle cx="50" cy="50" r="9"   fill="#2563EB" fill-opacity="0.2"/>
  <circle cx="50" cy="50" r="5.5" fill="#2563EB"/>
  <circle cx="50" cy="50" r="2.5" fill="white" fill-opacity="0.7"/>
</svg>
